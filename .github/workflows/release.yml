name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          if ! [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version tag format. Expected vX.Y.Z"
            exit 1
          fi

      - name: Verify package version matches tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Run release gates
        run: |
          npm run verify
          npm run build
          npm run test:e2e
          npm run release:preflight

      - name: Package desktop application
        run: npm run package:electron
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          path: |
            dist/electron/*.exe
            dist/electron/*.blockmap
            dist/electron/latest*.yml
            dist/electron/RELEASE_MANIFEST.json
            dist/electron/SHA256SUMS.txt

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/electron/*.exe
            dist/electron/*.blockmap
            dist/electron/latest*.yml
            dist/electron/RELEASE_MANIFEST.json
            dist/electron/SHA256SUMS.txt
          generate_release_notes: true
